services:
  postgres:
    image: postgres:16.4
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  kafka:
    image: bitnamilegacy/kafka:3.7.0
    container_name: kafka

    ports:
      - "9092:9092"
      - "9094:9094"

    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller

      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094

      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094

      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT

      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"

      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1

      ALLOW_PLAINTEXT_LISTENER: "yes"

    volumes:
      - kafka-data:/bitnami/kafka

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  rest-producer:
    build:
      context: .
      dockerfile: docker/producer/Dockerfile
      

    container_name: rest-producer
    command: python /producer/rest_producer.py

    env_file:
      - .env

    environment:
      PYTHONUNBUFFERED: "1"

    depends_on:
      minio:
       condition: service_healthy
      
    restart: "no"
  
  ws-producer:
    build: 
      context: .
      dockerfile: docker/producer/Dockerfile
    container_name: ws-producer
    command: python /producer/websocket_producer.py

    env_file:
      - .env

    environment:
      KAFKA_BROKER: kafka:9092
      PYTHONUNBUFFERED: "1"

    depends_on:
      kafka:
        condition: service_healthy

    restart: unless-stopped

  spark-batch:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    
    environment:
       PYTHONPATH: /app:/app/spark
    container_name: spark-batch

    depends_on:
      - minio
      - postgres
    volumes:
      - .:/app
    # Full path pass karein
    command: /opt/spark/bin/spark-submit /app/spark/batch/batch_job.py

  spark-stream:
    build: 
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: spark-streaming
    environment:
      PYTHONPATH: /app:/app/spark
    env_file:
      - .env
    depends_on:
      - kafka
      - minio
      - postgres
    command: >
      spark-submit
      --packages org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.0
      /app/spark/streaming/streaming_job.py
    
  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile

    container_name: airflow

    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started

    ports:
      - "8081:8080"

    env_file:
      - .env

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho="
      PYTHONUNBUFFERED: "1"

    command: airflow standalone

    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z

    container_name: minio

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    ports:
      - "9000:9000"
      - "9001:9001"
    
    healthcheck:
      test: ["CMD", "curl","-f","http://localhost:9001/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s

    volumes:
      - minio-data:/data

    restart: unless-stopped

  streamlit:
    build: 
      context: .
      dockerfile: docker/streamlit/Dockerfile
    container_name: stremlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  postgres-data:
  kafka-data:
  minio-data: